name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - run: go test -race ./...
      - run: go test -tags purego ./...
      - name: Compile comparison benchmark
        working-directory: bench/compare
        run: go test -run '^$' ./...

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - run: go test -race ./...

  cross-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: Cross-compile all amd64 and arm64 ports
        shell: bash
        run: |
          set -euo pipefail
          while read -r target; do
            case "$target" in
              */amd64|*/arm64)
                os=${target%/*}
                arch=${target#*/}
                CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build ./...
                ;;
            esac
          done < <(go tool dist list)
